<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>홈 · Crabit 학생</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
    colors: {
      brand: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',400:'#a78bfa',600:'#7c3aed',700:'#6d28d9' },
      ink:   { 900:'#111827',700:'#374151',500:'#6b7280',400:'#9ca3af',300:'#d1d5db' },
      paper: '#f6f7fb'
    },
    boxShadow: {
      card:'0 1px 2px rgba(17,24,39,.04),0 8px 24px rgba(17,24,39,.06)',
      soft:'0 1px 2px rgba(17,24,39,.04),0 4px 12px rgba(17,24,39,.04)'
    },
    borderRadius: { '3xl':'1.5rem' }
  }}
}
</script>
<style>
  html,body { background:#f6f7fb; font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif; margin:0; }
  .ring-soft { box-shadow:inset 0 0 0 1px #eef0f5; }
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#fff; border-top:1px solid #f3f4f6; display:flex; z-index:10; }
  .nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 0; font-size:11px; font-weight:600; color:#9ca3af; text-decoration:none; transition:color .15s; border:none; background:none; cursor:pointer; font-family:inherit; }
  .nav-tab.active { color:#6d28d9; }
  .nav-tab.disabled { color:#d1d5db; cursor:default; }
</style>
</head>
<body>

<div style="max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;">
  <div class="px-5 pt-12 pb-4" id="content">
    <!-- JS로 렌더링 -->
  </div>
</div>

<!-- 하단 탭 네비 -->
<nav class="bottom-nav">
  <a href="student-home.html" class="nav-tab active">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/>
    </svg>
    홈
  </a>
  <button class="nav-tab disabled" onclick="return false">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>
    </svg>
    기록
  </button>
  <a href="student-mypage.html" class="nav-tab">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c2-4 6-6 8-6s6 2 8 6"/>
    </svg>
    내 정보
  </a>
</nav>

<script>
const SESS_KEY = 'crabit_student_session';
const REC_KEY  = 'crabit_student_records';

// 로그인 체크
const sess = JSON.parse(localStorage.getItem(SESS_KEY) || 'null');
if (!sess) { location.href = 'student-login.html'; }

const name = sess ? sess.name : '학생';
const records = JSON.parse(localStorage.getItem(REC_KEY) || '{}');
const today = new Date().toISOString().split('T')[0];
const recordedToday = !!records[today];

// 스트릭 계산
let streak = 0;
const d = new Date();
while (true) {
  const key = d.toISOString().split('T')[0];
  if (!records[key]) break;
  streak++;
  d.setDate(d.getDate() - 1);
}

// 인사말
const hour = new Date().getHours();
const greeting = hour < 12 ? '좋은 아침이에요' : hour < 18 ? '좋은 오후예요' : '오늘도 수고했어요';
const streakEmoji = streak >= 7 ? '🔥' : streak >= 3 ? '✨' : '🌱';
const streakMsg =
  streak === 0 ? '오늘 기록하면 연속 기록이 시작돼요!' :
  streak < 7   ? `${7 - streak}일 더 기록하면 🔥 달성이에요!` :
  '7일 연속 달성! 정말 대단해요 🏆';

// 오늘 기록 카드
const recordCard = recordedToday
  ? `<div class="rounded-3xl p-6 mb-4" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)">
      <div class="text-[12px] font-bold mb-1" style="color:rgba(255,255,255,.7)">오늘 기록 완료 ✓</div>
      <div class="text-[22px] font-extrabold text-white mb-2">잘 했어요! 오늘도 멋졌어요 🎉</div>
      <div class="text-sm" style="color:rgba(255,255,255,.7)">내일도 기록하면 ${streak + 1}일 연속 달성이에요</div>
    </div>`
  : `<div class="bg-white rounded-3xl p-6 shadow-card ring-soft mb-4">
      <div class="text-[12px] font-bold text-ink-500 mb-1">오늘 기록</div>
      <div class="text-[22px] font-extrabold text-ink-900 mb-1">아직 기록이 없어요</div>
      <div class="text-sm text-ink-500 mb-4">오늘 하루를 기록하고 AI 피드백을 받아보세요</div>
      <button onclick="alert('기록 기능은 곧 열려요!')" class="px-5 py-2.5 rounded-xl text-white text-sm font-bold border-none cursor-pointer" style="background:#7c3aed">
        지금 기록하기 →
      </button>
    </div>`;

document.getElementById('content').innerHTML = `
  <!-- 헤더 -->
  <div class="flex items-center justify-between mb-8">
    <div class="text-[20px] font-extrabold tracking-tight" style="color:#7c3aed">Crabit</div>
    <a href="student-mypage.html" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:#f5f3ff">
      <svg class="w-5 h-5" style="color:#7c3aed" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c2-4 6-6 8-6s6 2 8 6"/>
      </svg>
    </a>
  </div>

  <!-- 인사 -->
  <div class="mb-6">
    <p class="text-sm font-bold mb-1" style="color:#7c3aed">${greeting} 👋</p>
    <h1 class="text-[26px] font-extrabold leading-snug">
      ${name}의 하루를<br/>기록해볼까요?
    </h1>
  </div>

  <!-- 오늘 기록 -->
  ${recordCard}

  <!-- 연속 기록 -->
  <div class="bg-white rounded-3xl p-5 shadow-card ring-soft mb-4">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-[12px] font-bold text-ink-500 mb-1">연속 기록</div>
        <div class="flex items-baseline gap-1.5">
          <span class="font-extrabold text-ink-900" style="font-size:36px">${streak}</span>
          <span class="text-[14px] font-bold text-ink-500">일째</span>
        </div>
      </div>
      <div style="font-size:36px;user-select:none">${streakEmoji}</div>
    </div>
    <div class="mt-3 text-xs ${streak >= 7 ? 'font-semibold' : 'text-ink-400'}" ${streak >= 7 ? 'style="color:#7c3aed"' : ''}>
      ${streakMsg}
    </div>
  </div>

  <!-- 성적 예측 잠금 -->
  <div class="bg-white rounded-3xl p-5 shadow-card ring-soft" style="opacity:.5">
    <div class="flex items-center gap-3 mb-2">
      <svg class="w-5 h-5 text-ink-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <div class="text-[13px] font-bold text-ink-500">성적 예측</div>
    </div>
    <div class="text-[15px] font-bold text-ink-700 mb-0.5">4주 기록하면 열려요</div>
    <div class="text-xs text-ink-400">데이터가 쌓이면 AI가 성적을 예측해드려요</div>
  </div>
`;
</script>
</body>
</html>
